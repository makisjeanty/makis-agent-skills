name: Validate Docs

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate markdown links
        run: python scripts/validate-markdown-links.py
